tasks:
  - init: yarn && yarn build && npm i -g @zowe/cli
  - command: zowe plugins install @zowe/zos-ftp-for-zowe-cli
  - command: zowe plugins install @broadcom/endevor-bridge-for-git-for-zowe-cli
  - command: @broadcom/endevor-for-zowe-cli
vscode:
  extensions:
    - zowe.vscode-extension-for-zowe
    - zowe.zowe-explorer-ftp-extension
    - broadcommfd.code4z-extension-pack
    - eamodio.gitlens
    - eg2.vscode-npm-script
    - christian-kohler.npm-intellisense
    - esbenp.prettier-vscode
    - visualstudioexptteam.vscodeintellicode
    - dbaeumer.vscode-eslint
    - orta.vscode-jest
